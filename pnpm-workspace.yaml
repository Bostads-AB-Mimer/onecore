packages:
  - apps/*
  - apps/internal-portal/*
  - core
  - libs/*
  - services/*

injectWorkspacePackages: true

minimumReleaseAge: 5760
syncInjectedDepsAfterScripts:
  - build

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - prisma

minimumReleaseAgeExclude:
  - koa-okapi-router
